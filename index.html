<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asa Invest — Validação</title>
  <style>
    body { font-family: sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f3; color:#222; }
    h1 { font-size: 20px; margin-bottom: .25rem; }
    .sub { color:#888; font-size:13px; margin-bottom:1.25rem; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .metric { background: #fff; border-radius: 10px; padding: 1rem; border: 1px solid #e8e8e5; text-align: center; }
    .metric-val { font-size: 30px; font-weight: 700; }
    .metric-label { font-size: 12px; color: #888; margin-top: 4px; }
    .card { background: #fff; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #e8e8e5; }
    .status { font-size: 13px; color: #888; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: #888; font-weight: 500; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    td { padding: 8px 0; border-bottom: 1px solid #f5f5f3; }
    .error { color: #D85A30; background: #FAECE7; padding: 1rem; border-radius: 8px; }
    button { background: #19334A; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>

<h1>Asa Invest — Dashboard de Validação</h1>
<p class="sub">Funil de Vendas · RD CRM</p>
<p class="status" id="status">Carregando...</p>
<button onclick="loadData()">↻ Atualizar</button>

<div style="margin-top: 1rem;">
  <div class="metrics">
    <div class="metric"><div class="metric-val" id="open" style="color:#19334A">—</div><div class="metric-label">Em andamento</div></div>
    <div class="metric"><div class="metric-val" id="won" style="color:#1D9E75">—</div><div class="metric-label">Ganhos</div></div>
    <div class="metric"><div class="metric-val" id="lost" style="color:#D85A30">—</div><div class="metric-label">Perdidos</div></div>
    <div class="metric"><div class="metric-val" id="total" style="color:#888">—</div><div class="metric-label">Total no funil</div></div>
  </div>

  <div class="card">
    <h2 style="font-size:14px;margin-bottom:12px;">Amostra de negócios em andamento</h2>
    <div id="deals-list">Carregando...</div>
  </div>
</div>

<script>
async function loadData() {
  document.getElementById('status').textContent = 'Atualizando...';
  try {
    const res = await fetch('/api/deals');
    if (!res.ok) throw new Error('Erro HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('open').textContent = data.open_total ?? 0;
    document.getElementById('won').textContent = data.won_total ?? 0;
    document.getElementById('lost').textContent = data.lost_total ?? 0;
    document.getElementById('total').textContent = data.grand_total ?? 0;

    const deals = data.open_sample || [];
    if (!deals.length) {
      document.getElementById('deals-list').innerHTML = '<p style="color:#aaa">Nenhum negócio em andamento na amostra.</p>';
    } else {
      document.getElementById('deals-list').innerHTML =
        '<table><thead><tr><th>Nome</th><th>Etapa</th><th>Responsável</th></tr></thead><tbody>' +
        deals.slice(0, 15).map(function(d){
          return '<tr><td>' + d.name + '</td><td>' + d.stage + '</td><td>' + d.user + '</td></tr>';
        }).join('') +
        '</tbody></table>';
    }

    document.getElementById('status').textContent =
      'Atualizado às ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('status').textContent = 'Erro ao carregar';
    document.getElementById('deals-list').innerHTML = '<div class="error">Erro: ' + e.message + '</div>';
  }
}
loadData();
</script>
</body>
</html>
